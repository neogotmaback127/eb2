<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gmail Insights - Premium Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <div class="glass-container">
      <header>
        <div class="logo">
          <span class="icon">✨</span>
          <h1>Gmail Insights <span>Pro</span></h1>
        </div>
        <div class="user-controls">
          <div id="user-info" class="user-info hidden">
            <span id="user-name"></span>님 환영합니다!
            <button id="logout-btn" class="btn-outline">로그아웃</button>
          </div>
          <button id="login-btn" class="btn-primary login-btn">Google로 시작하기</button>
        </div>
      </header>

      <section class="overview">
        <div class="stat-card">
          <span class="label">전체 안건</span>
          <span id="total-threads" class="value">0</span>
        </div>
        <div class="stat-card">
          <span class="label">종결됨</span>
          <span id="closed-threads" class="value">0</span>
        </div>
        <div class="stat-card">
          <span class="label">진행 중</span>
          <span id="active-threads" class="value">0</span>
        </div>
      </section>

      <div class="filter-tabs">
        <button class="tab-btn active" data-filter="all">전체</button>
        <button class="tab-btn" data-filter="일반 메일">👥 일반 메일</button>
        <button class="tab-btn" data-filter="자동 메일">🤖 자동 메일</button>
      </div>

      <main id="thread-grid">
        <div class="loader-container">
          <div class="loader"></div>
          <p>데이터를 불러오고 있습니다...</p>
        </div>
      </main>

      <footer>
        <p>&copy; 2024 Premium Email Intelligence Dashboard</p>
      </footer>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="modal" class="modal">
    <div class="modal-content glass">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <span class="close-btn">&times;</span>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, setDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    // window 객체에 등록하여 일반 스크립트(app.js)에서 사용할 수 있게 합니다.
    window.FirebaseLib = { 
      initializeApp, getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged,
      getFirestore, collection, addDoc, getDocs, query, where, setDoc, doc, serverTimestamp
    };
  </script>

  <script src="app.js"></script>
</body>
</html>
